name: ScoreMaster
description: "Приложения для подсчета очков в игре в карты."
version: 2.6.2

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  auto_size_text: ^3.0.0
  flutter_colorpicker: ^1.1.0
  syncfusion_flutter_charts: ^26.1.41+1
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  sqflite: ^2.3.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  module:
    androidX: true
    androidPackage: com.score_master
    iosBundleIdentifier: com.score_master
