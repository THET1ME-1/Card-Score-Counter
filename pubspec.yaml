name: score_master
description: 'Приложение для подсчёта очков в карточной игре КунКен.'
version: 1.0.5+6

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  auto_size_text: ^3.0.0
  flutter_colorpicker: ^1.1.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  file_picker: ^10.2.0
  image_picker: ^1.1.2
  path: ^1.9.0
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  audioplayers: ^6.1.0
  open_filex: ^4.5.0
  dynamic_color: ^1.7.0
  animations: ^2.0.11
  quick_actions: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    # Сам pubspec — чтобы показывать версию приложения прямо из yaml (не хардкод).
    - pubspec.yaml

  fonts:
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded.ttf
    - family: Onest
      fonts:
        - asset: assets/fonts/Onest.ttf
